<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Terminal Counter</title>

<style>
body {
  margin: 0;
  background: #0b1120;
  font-family: "Courier New", monospace;
  color: #00ff88;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  overflow: hidden;
}

/* Scanline effect */
body::after {
  content: "";
  position: absolute;
  width: 100%;
  height: 100%;
  background: repeating-linear-gradient(
    to bottom,
    rgba(0,255,136,0.03),
    rgba(0,255,136,0.03) 1px,
    transparent 1px,
    transparent 3px
  );
  pointer-events: none;
}

.terminal {
  background: #111827;
  border-radius: 10px;
  width: 460px;
  padding: 20px;
  box-shadow: 0 0 25px rgba(0,255,136,0.25);
}

.header {
  color: #94a3b8;
  font-size: 13px;
  margin-bottom: 15px;
}

.line {
  margin: 6px 0;
}

.prompt {
  color: #00ff88;
}

.command {
  color: #38bdf8;
}

.stats {
  color: #facc15;
}

.counter {
  margin-top: 10px;
  font-size: 20px;
  font-weight: bold;
}

.cursor {
  display: inline-block;
  width: 10px;
  background: #00ff88;
  animation: blink 1s infinite;
}

@keyframes blink {
  50% { opacity: 0; }
}
</style>
</head>

<body>

<div class="terminal">
  <div class="header">
    user@system:~$ status monitor
  </div>

  <div class="line stats">
    CPU: <span id="cpu">91%</span> | RAM: <span id="ram">11GB / 16GB</span>
  </div>

  <div class="line">
    <span class="prompt">$</span>
    <span id="typing"></span>
  </div>

  <div class="line counter">
    > total_visitors: <span id="count">...</span>
  </div>

  <div class="line">
    <span class="prompt">$</span>
    <span class="cursor"></span>
  </div>
</div>

<script>
const typingElement = document.getElementById("typing");
const text = "initializing visitor protocol...";
let i = 0;

function typeEffect() {
  if (i < text.length) {
    typingElement.innerHTML += text.charAt(i);
    i++;
    setTimeout(typeEffect, 40);
  }
}
typeEffect();

/* Animated fake stats */
function randomStats() {
  document.getElementById("cpu").innerText =
    Math.floor(80 + Math.random() * 20) + "%";
  document.getElementById("ram").innerText =
    (10 + Math.floor(Math.random() * 4)) + "GB / 16GB";
}
setInterval(randomStats, 2000);

/* Visitor counter with rolling animation */
fetch("https://api.countapi.xyz/CYPHER-GAMES/visits")
  .then(res => res.json())
  .then(data => {
    let current = 0;
    const target = data.value;
    const counter = document.getElementById("count");

    const interval = setInterval(() => {
      current += Math.ceil(target / 50);
      if (current >= target) {
        current = target;
        clearInterval(interval);
      }
      counter.innerText = current;
    }, 30);
  });
</script>

</body>
</html>
